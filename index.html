<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pantheon | 100 Icons of Humanity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-low: rgba(212, 175, 55, 0.1);
            --bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg);
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #0a0a0a 70%);
        }

        .serif-title { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }

        /* Glassmorphism Card */
        .personality-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .personality-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .personality-card:hover {
            border-color: var(--gold);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px var(--gold-low);
        }

        .personality-card:hover::before { transform: translateX(100%); }

        .gold-gradient-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .view-transition { display: none; opacity: 0; }
        .active-view { display: block; opacity: 1; }

        .loader {
            border-top-color: var(--gold);
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 px-10 py-6 flex justify-between items-center backdrop-blur-md border-b border-white/5">
        <div class="serif-title text-xl font-bold gold-gradient-text cursor-pointer" onclick="showGallery()">THE PANTHEON</div>
        <div class="w-72 relative">
            <input type="text" id="searchInput" placeholder="Search the archives..." 
                class="w-full bg-white/5 border border-white/10 rounded-full py-2 px-5 text-sm focus:outline-none focus:border-[#D4AF37] transition-all">
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6 max-w-7xl mx-auto">
        
        <section id="galleryView" class="view-transition active-view">
            <div class="text-center mb-24 hero-content">
                <h2 class="text-xs uppercase tracking-[0.5em] text-gray-500 mb-4">Eternal Registry</h2>
                <h1 class="text-6xl md:text-8xl serif-title mb-6">Hall of <span class="gold-gradient-text">Greatness</span></h1>
                <div class="h-1 w-24 bg-[#D4AF37] mx-auto mb-8"></div>
            </div>
            
            <div id="personalityGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                </div>
        </section>

        <section id="bioView" class="view-transition">
            <button onclick="showGallery()" class="group mb-12 flex items-center gap-3 text-xs uppercase tracking-widest text-gray-400 hover:text-[#D4AF37] transition-colors">
                <span class="text-xl group-hover:-translate-x-2 transition-transform">←</span> Return to Archive
            </button>
            <div id="bioContent"></div>
        </section>

    </main>

    <script>
        // 100 Curated Personalities
        const personalities = [
            "Albert Einstein", "Leonardo da Vinci", "Isaac Newton", "Marie Curie", "Nikola Tesla", 
            "Aristotle", "Socrates", "Plato", "Galileo Galilei", "Charles Darwin", 
            "Ada Lovelace", "Alan Turing", "Stephen Hawking", "Nelson Mandela", "Mahatma Gandhi",
            "Martin Luther King Jr.", "Abraham Lincoln", "George Washington", "Napoleon", "Julius Caesar",
            "Alexander the Great", "Genghis Khan", "Cleopatra", "Joan of Arc", "Queen Elizabeth I",
            "Catherine the Great", "Winston Churchill", "Franklin D. Roosevelt", "Rosa Parks", "Malala Yousafzai",
            "Mother Teresa", "Dalai Lama", "Confucius", "Buddha", "Jesus", "Muhammad",
            "William Shakespeare", "Dante Alighieri", "Homer", "Leo Tolstoy", "Mark Twain",
            "Virginia Woolf", "Jane Austen", "Emily Dickinson", "Vincent van Gogh", "Pablo Picasso",
            "Michelangelo", "Claude Monet", "Frida Kahlo", "Salvador Dalí", "Andy Warhol",
            "Wolfgang Amadeus Mozart", "Ludwig van Beethoven", "Johann Sebastian Bach", "Frédéric Chopin", "Miles Davis",
            "Louis Armstrong", "Aretha Franklin", "Bob Dylan", "John Lennon", "Freddie Mercury",
            "Thomas Edison", "Alexander Graham Bell", "Steve Jobs", "Bill Gates", "Elon Musk",
            "Henry Ford", "Wright brothers", "Neil Armstrong", "Yuri Gagarin", "Buzz Aldrin",
            "Christopher Columbus", "Marco Polo", "Ferdinand Magellan", "James Cook", "Roald Amundsen",
            "Sigmund Freud", "Carl Jung", "Friedrich Nietzsche", "Jean-Paul Sartre", "Simone de Beauvoir",
            "Adam Smith", "Karl Marx", "John Maynard Keynes", "Coco Chanel", "Christian Dior",
            "Walt Disney", "Alfred Hitchcock", "Charlie Chaplin", "Marilyn Monroe", "Audrey Hepburn",
            "Bruce Lee", "Muhammad Ali", "Pelé", "Michael Jordan", "Serena Williams",
            "Marco Aurelius", "Rumi", "Kahlil Gibran", "Omar Khayyam", "Ibn Battuta"
        ].sort();

        const grid = document.getElementById('personalityGrid');
        const searchInput = document.getElementById('searchInput');

        function init() {
            renderGallery(personalities);
            setupSearch();
        }

        function renderGallery(list) {
            grid.innerHTML = '';
            list.forEach((name) => {
                const card = document.createElement('div');
                card.className = 'personality-card p-10 rounded-xl text-center flex flex-col items-center justify-center aspect-square';
                card.innerHTML = `
                    <div class="text-[10px] text-amber-600 font-bold uppercase mb-2 tracking-widest opacity-50">Profile</div>
                    <h3 class="serif-title text-sm md:text-base leading-tight">${name}</h3>
                `;
                card.onclick = () => fetchAndShowBio(name);
                grid.appendChild(card);
            });

            gsap.from(".personality-card", {
                duration: 1,
                y: 50,
                opacity: 0,
                stagger: 0.02,
                ease: "expo.out"
            });
        }

        function setupSearch() {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = personalities.filter(p => p.toLowerCase().includes(term));
                renderGallery(filtered);
            });
        }

        async function fetchAndShowBio(name) {
            switchView('bioView');
            const container = document.getElementById('bioContent');
            container.innerHTML = `<div class="flex flex-col items-center justify-center py-40">
                <div class="loader w-12 h-12 border-4 border-white/10 rounded-full mb-4"></div>
                <p class="text-xs uppercase tracking-widest gold-text">Retrieving Chronicles...</p>
            </div>`;

            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
                const data = await res.json();

                container.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
                        <div class="lg:col-span-5 relative">
                            <div class="aspect-[3/4] overflow-hidden rounded-2xl shadow-2xl border border-white/10">
                                <img src="${data.originalimage ? data.originalimage.source : (data.thumbnail ? data.thumbnail.source : 'https://via.placeholder.com/600x800')}" 
                                     class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000">
                            </div>
                            <div class="absolute -z-10 top-10 -right-10 w-full h-full border border-[#D4AF37]/30 rounded-2xl"></div>
                        </div>
                        <div class="lg:col-span-7">
                            <h2 class="text-6xl md:text-8xl serif-title gold-gradient-text mb-4">${data.title}</h2>
                            <p class="text-xl text-gray-400 italic mb-8">${data.description || 'Icon of History'}</p>
                            <p class="text-lg leading-relaxed text-gray-300 font-light mb-10 first-letter:text-5xl first-letter:gold-text first-letter:mr-3 first-letter:float-left first-letter:serif-title">
                                ${data.extract}
                            </p>
                            <a href="${data.content_urls.desktop.page}" target="_blank" 
                               class="inline-block px-10 py-4 border border-[#D4AF37] text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition-all text-xs uppercase tracking-widest font-bold">
                                Explore Full Biography
                            </a>
                        </div>
                    </div>
                `;

                gsap.from("#bioContent", { opacity: 0, x: 100, duration: 0.8 });
            } catch (err) {
                container.innerHTML = `<p class="text-center py-40 text-red-400">The archives are currently sealed. Please try again later.</p>`;
            }
        }

        function switchView(id) {
            document.querySelectorAll('.view-transition').forEach(v => {
                v.classList.remove('active-view');
                v.style.display = 'none';
            });
            const target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.classList.add('active-view'), 10);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showGallery() { switchView('galleryView'); }

        init();
    </script>
</body>
</html>
