<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Great Personalities | Digital Museum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --charcoal: #121212;
            --slate: #1a1a1a;
        }
        body {
            background-color: var(--charcoal);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        
        .gold-text { color: var(--gold); }
        .gold-border { border-color: var(--gold); }
        
        .personality-card {
            background: var(--slate);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .personality-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.3);
        }
        .view-transition { display: none; opacity: 0; }
        .active-view { display: block; opacity: 1; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--charcoal); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center bg-opacity-90 bg-[#121212] border-b border-gray-800">
        <div class="text-2xl font-bold gold-text serif tracking-widest uppercase">The Pantheon</div>
        <div class="relative w-1/3">
            <input type="text" id="searchInput" placeholder="Search the Greats..." 
                class="w-full bg-transparent border-b border-gray-600 focus:border-[#D4AF37] outline-none py-1 px-2 text-sm transition-all">
        </div>
    </nav>

    <main class="pt-32 pb-20 px-8 max-w-7xl mx-auto">
        
        <section id="galleryView" class="view-transition active-view">
            <header class="mb-16 text-center">
                <h1 class="text-5xl md:text-7xl mb-4">Hall of Greats</h1>
                <p class="text-gray-400 italic font-light tracking-wide">"The history of the world is but the biography of great men." — Thomas Carlyle</p>
            </header>
            
            <div id="personalityGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                </div>
        </section>

        <section id="bioView" class="view-transition">
            <button onclick="showGallery()" class="mb-8 flex items-center gap-2 text-sm uppercase tracking-widest gold-text hover:opacity-70 transition-all">
                ← Back to Gallery
            </button>
            <div id="bioContent" class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
                </div>
        </section>

    </main>

    <script>
        // Database of names to fetch (Can easily expand to 100+)
        const personalities = [
            "Leonardo da Vinci", "Marie Curie", "Albert Einstein", "Nelson Mandela", 
            "Aristotle", "Ada Lovelace", "Mahatma Gandhi", "Nikola Tesla", 
            "Maya Angelou", "Galileo Galilei", "Frida Kahlo", "Isaac Newton",
            "Socrates", "Hypatia", "Martin Luther King Jr.", "Vincent van Gogh"
        ];

        const grid = document.getElementById('personalityGrid');
        const searchInput = document.getElementById('searchInput');

        // INITIALIZE APP
        function init() {
            renderGallery(personalities);
            setupSearch();
        }

        function renderGallery(list) {
            grid.innerHTML = '';
            list.forEach((name, index) => {
                const card = document.createElement('div');
                card.className = 'personality-card p-8 rounded-sm text-center flex flex-col items-center justify-center min-h-[200px]';
                card.innerHTML = `
                    <span class="text-xs gold-text mb-2 uppercase tracking-tighter opacity-60">Entry #${index + 1}</span>
                    <h3 class="text-xl serif font-semibold">${name}</h3>
                    <div class="mt-4 w-8 h-[1px] bg-[#D4AF37]"></div>
                `;
                card.onclick = () => showBio(name);
                grid.appendChild(card);
            });

            gsap.from(".personality-card", {
                duration: 0.8,
                y: 30,
                opacity: 0,
                stagger: 0.05,
                ease: "power2.out"
            });
        }

        function setupSearch() {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = personalities.filter(p => p.toLowerCase().includes(term));
                renderGallery(filtered);
            });
        }

        async function showBio(name) {
            // Switch Views
            switchView('bioView');
            const bioContent = document.getElementById('bioContent');
            bioContent.innerHTML = `<div class="col-span-2 text-center py-20 gold-text animate-pulse">Consulting Archives...</div>`;

            try {
                // Fetch from Wikipedia API
                const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
                const data = await response.json();

                bioContent.innerHTML = `
                    <div class="relative group">
                        <img src="${data.thumbnail ? data.thumbnail.source : 'https://via.placeholder.com/600x800?text=No+Image+Found'}" 
                             alt="${name}" class="w-full grayscale hover:grayscale-0 transition-all duration-700 shadow-2xl">
                        <div class="absolute -bottom-4 -right-4 w-full h-full border-2 gold-border -z-10"></div>
                    </div>
                    <div>
                        <h2 class="text-6xl gold-text mb-6">${data.title}</h2>
                        <p class="text-xl italic text-gray-400 mb-8">${data.description || 'Historical Figure'}</p>
                        <div class="h-[1px] w-20 bg-[#D4AF37] mb-8"></div>
                        <p class="leading-relaxed text-gray-300 text-lg mb-8">
                            ${data.extract}
                        </p>
                        <a href="${data.content_urls.desktop.page}" target="_blank" class="px-8 py-3 border gold-border gold-text hover:bg-[#D4AF37] hover:text-black transition-all uppercase text-xs tracking-widest">
                            Read Full Dossier
                        </a>
                    </div>
                `;

                gsap.from("#bioContent > div", {
                    x: 50,
                    opacity: 0,
                    duration: 1,
                    stagger: 0.2,
                    ease: "power3.out"
                });

            } catch (error) {
                bioContent.innerHTML = `<p class="col-span-2 text-center">Historical data currently unavailable.</p>`;
            }
        }

        function showGallery() {
            switchView('galleryView');
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-transition').forEach(v => {
                v.style.display = 'none';
                v.style.opacity = '0';
            });
            const active = document.getElementById(viewId);
            active.style.display = 'block';
            gsap.to(active, { opacity: 1, duration: 0.5 });
        }

        init();
    </script>
</body>
</html>
